<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f14" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f5" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>HostForge Control Plane</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("hf-prefs");
          var theme = "dark";
          if (raw) {
            var o = JSON.parse(raw);
            if (o.theme === "light") theme = "light";
            else if (o.theme === "dark") theme = "dark";
          } else {
            var leg = localStorage.getItem("hf-theme");
            if (leg === "light" || leg === "dark") theme = leg;
          }
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-hf-bg text-hf-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
