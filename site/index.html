    <script>
      (function () {
        try {
          var raw = localStorage.getItem("hf-prefs");
          var theme = "dark";
          if (raw) {
            var o = JSON.parse(raw);
            if (o.theme === "light") theme = "light";
            else if (o.theme === "dark") theme = "dark";
            /* "system" or unknown → dark for first paint on this site */
          } else {
            var leg = localStorage.getItem("hf-theme");
            if (leg === "light" || leg === "dark") theme = leg;
          }
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
