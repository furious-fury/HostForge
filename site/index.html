<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HostForge — self-hosted PaaS: Git to Nixpacks to Docker on one machine." />
    <title>HostForge</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("hf-prefs");
          var theme = "dark";
          if (raw) {
            var o = JSON.parse(raw);
            if (o.theme === "light") theme = "light";
            else if (o.theme === "dark") theme = "dark";
            /* "system" or unknown → dark for first paint on this site */
          } else {
            var leg = localStorage.getItem("hf-theme");
            if (leg === "light" || leg === "dark") theme = leg;
          }
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
